<section class="auth-wrapper" [class.light-mode]="!isDarkMode()">
  <button type="button" class="theme-toggle-btn" (click)="toggleTheme()" [title]="isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'">
    {{ isDarkMode() ? '☀️' : '🌙' }}
  </button>
  <div class="auth-card">
    <div class="brand">
      <img src="assets/logo_final.png" alt="Ubica2 Logo" class="auth-logo" />
      <h1>Crear Cuenta</h1>
    </div>
    <p class="subtitle">Únete a la comunidad de Ubica2 y descubre los mejores lugares y eventos.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="input-group">
          <label for="fullName">Nombre Completo</label>
          <div class="input-wrapper">
            <input id="fullName" type="text" formControlName="fullName" placeholder="Tu nombre real" />
          </div>
        </div>

        <div class="input-group">
          <label for="username">Alias @</label>
          <div class="input-wrapper">
            <input id="username" type="text" formControlName="username" placeholder="Como te verán otros" />
          </div>
        </div>

        <div class="input-group">
          <label for="phone">Teléfono (Opcional)</label>
          <div class="input-wrapper">
            <input id="phone" type="text" formControlName="phone" placeholder="+57 3..." />
          </div>
        </div>

        <div class="input-group">
          <label for="birthDate">Fecha de Nacimiento</label>
          <div class="input-wrapper">
            <input id="birthDate" type="date" formControlName="birthDate" />
          </div>
        </div>

        <div class="input-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <input id="email" type="email" formControlName="email" placeholder="correo@dominio.com" />
          </div>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input id="password" type="password" formControlName="password" placeholder="••••••••" />
          </div>
        </div>
      </div>

      <div class="alert error-alert" *ngIf="error()">
        <span class="icon">⚠️</span> {{ error() }}
      </div>

      <button type="submit" [disabled]="loading() || form.invalid" class="btn-primary">
        <span class="spinner" *ngIf="loading()"></span>
        {{ loading() ? 'Procesando...' : 'Regístrate' }}
      </button>
    </form>

    <div class="auth-footer">
      <p class="hint">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </p>
    </div>
  </div>
</section>
