<section class="auth-wrapper" [class.light-mode]="!isDarkMode()">
  <button type="button" class="theme-toggle-btn" (click)="toggleTheme()" [title]="isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'">
    {{ isDarkMode() ? '☀️' : '🌙' }}
  </button>
  <div class="auth-card pastel-theme">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>Iniciar sesión</h1>
    </div>
    <p class="subtitle">Accede para guardar favoritos, reportar y administrar según tu rol.</p>

    <div class="alert success-alert" *ngIf="successMessage()">
      <span class="icon">✨</span> {{ successMessage() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="input-group">
        <label for="email">Correo o Usuario</label>
        <div class="input-wrapper" [class.has-error]="isFieldInvalid('email')">
          <input id="email" type="text" formControlName="email" placeholder="Escribe 'user', 'admin' u 'owner'" />
        </div>
        <div class="field-error" *ngIf="isFieldInvalid('email')">
          <span *ngIf="form.get('email')?.errors?.['required']">Este campo es obligatorio.</span>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper" [class.has-error]="isFieldInvalid('password')">
          <input id="password" type="password" formControlName="password" placeholder="••••••••" />
        </div>
        <div class="field-error" *ngIf="isFieldInvalid('password')">
          <span *ngIf="form.get('password')?.errors?.['required']">La contraseña es obligatoria.</span>
          <span *ngIf="form.get('password')?.errors?.['minlength']">Mínimo 4 caracteres.</span>
        </div>
      </div>

      <div class="alert error-alert" *ngIf="error()">
        <span class="icon">⚠️</span> {{ error() }}
      </div>

      <button type="submit" [disabled]="loading() || form.invalid" class="btn-primary">
        <span class="spinner" *ngIf="loading()"></span>
        {{ loading() ? 'Verificando...' : 'Entrar' }}
      </button>

      <div class="divider-text">
        <span>O TAMBIÉN</span>
      </div>

      <button type="button" class="btn-guest" (click)="guestLogin()">
        🚀 Entrar con modo Invitado (Demo)
      </button>
    </form>

    <div class="auth-footer">
      <p class="hint">
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </p>
      <p class="hint">
        ¿Aún no tienes cuenta? <a routerLink="/register">Crear cuenta</a>
      </p>
    </div>
  </div>
</section>
